<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML基礎レッスン</title>
  </head>
  <body>
    <!-- Step 1: 見出しを書いてみよう -->
    <h1>自己紹介</h1>

    <!-- Step 2: ここに <h2> と <p> を追加しよう -->
    <h2>初めまして。</h2>
    <p>私の名前は富田悠生です。イベント制作の勉強をしています。</p>

    <!-- Step 3: ここに <ul> または <ol> のリストを追加しよう -->
    <h2>好きなゲーム</h2>
    <ul>
      <li>VALORANT</li>
      <li>OverWatch</li>
    </ul>

    <!-- Step 4: ここに <a> リンクと <img> 画像を追加しよう -->
    <h2>リンク</h2>
    <p><a href="https://playvalorant.com/ja-jp/">VALORANTとは</a></p>
    <h2>キャラクター</h2>
    <img src="https://ctb.gg/wp-content/uploads/2024/01/GD2xis_a4AAIUNi.jpg" />

    <!-- Step 5: <div> でグループ化してみよう -->
    <div>
      <h1>自己紹介</h1>
      <h2>初めまして。</h2>
      <p>私の名前は富田悠生です。イベント制作の勉強をしています。</p>
    </div>

    <div>
      <h2>好きなゲーム</h2>
      <ul>
        <li>VALORANT</li>
        <li>OverWatch</li>
      </ul>
    </div>
  </body>
</html>
